# ============================================================
# CI/CD Pipeline — BERT Sentiment Analysis Project
# Runs automatically on every push to the main branch
# ============================================================

name: Sentiment Analysis CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────
  # STAGE 1: Install Requirements
  # ─────────────────────────────────────
  install:
    name: Install Requirements
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  # ─────────────────────────────────────
  # STAGE 2: Run Unit Tests
  # ─────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  # ─────────────────────────────────────
  # STAGE 3: Validate Model on New Dataset
  # Model will not be deployed unless
  # this stage passes successfully
  # ─────────────────────────────────────
  validate_new_dataset:
    name: Validate Model on New Dataset
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run validation on new dataset
        run: |
          python student_evaluation.py

  # ─────────────────────────────────────
  # STAGE 4: Deploy to Production
  # Only runs on push to main branch
  # ─────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate_new_dataset
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Deployment success
        run: echo "✅ Pipeline complete — model approved for deployment."
